<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<form method="GET" action="/history" class="mb-3">
    <input type="text" name="search" placeholder="Search by job role..." class="form-control">
    <button class="btn btn-primary mt-2">Search 🔍</button>
</form>

<div class="container mt-5">

    <h2 class="text-center mb-4">📊 Resume History</h2>

    <table class="table table-bordered">
        <tr>
            <th>ID</th>
            <th>Filename</th>
            <th>Job Role</th>
            <th>Score</th>
            <th>Skills</th>
            <th>Action</th>
            <th>Action</th>
        </tr>

        {% for r in data %}
        <tr>
            <td>{{ r.id }}</td>
            <td>{{ r.filename }}</td>
            <td>{{ r.job_role }}</td>
            <td>{{ r.score }}%</td>
            <td>{{ r.skills_found }}</td>
             <td>
             <a href="/delete/{{ r.id }}" class="btn btn-danger btn-sm">Delete 🗑️</a>
              </td>
            <td>
    <a href="/download/{{ r.id }}" class="btn btn-warning btn-sm">Download 📄</a>
</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
