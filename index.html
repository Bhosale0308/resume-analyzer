<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">📄 Resume Analyzer</h2>

        <form action="/analyze" method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Upload Resume</label>
                <input type="file" name="resumes" class="form-control" multiple required>
            </div>

            <div class="mb-3">
                <label class="form-label">Select Job Role</label>
                <select name="job_role" class="form-select">
                    <option value="python developer">Python Developer</option>
                    <option value="web developer">Web Developer</option>
                    <option value="data analyst">Data Analyst</option>
                </select>
            </div>

            <div class="text-center">
                <button class="btn btn-primary">Analyze 🚀</button>
            </div>
            <a href="/login" class="btn btn-dark">Go to Dashboard 🔐</a>
        </form>
    </div>

</div>

</body>
</html>
